version: '3.8'

services:
  gaop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaop-server
    ports:
      - "3000:3000"
      - "9090:9090"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - METRICS_PORT=9090
    restart: unless-stopped
    networks:
      - gaop-network

networks:
  gaop-network:
    driver: bridge
